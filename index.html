<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="bg-[url('./assets/background.jpg')] bg-cover bg-center">
    <div class="loader-container">
        <div class="loader"></div>
    </div>

    <section
        class=" w-[80%] md:w-[40%] mx-auto mt-40 border-5 border-fuchsia-500 rounded-2xl flex flex-col justify-center items-center space-y-[30px] text-amber-50  ">
        <h1 class="text-4xl font-extrabold my-2.5">Login <span class="text-green-400">Page</span></h1>
        <h3 class="text-xl font-bold mb-0">Username : </h3>
        <input id="username" class="p-2 border-2 border-blue-600 text-center" type="text" placeholder="Enter Your Username">
        <h3 class="text-xl font-bold mb-0">Password : </h3>
        <input id="password" class="mb-[15px] p-2 border-2 border-blue-600 text-center" type="text"
            placeholder="Enter Your Password">

        <button id="login-btn"
            class="my-0 p-4 bg-blue-500 hover:bg-red-300  rounded-2xl flex justify-center items-center text-2xl font-semibold">Login</button>

        <p id="login-text" class="font-bold text-green-600 italic text-2xl m-5"></p>
    </section>
    <script src="script/login.js"></script>
</body>

</html>
